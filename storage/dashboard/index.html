<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM AI — Universal Workspace Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { margin: 0; font-size: 24px; color: #38bdf8; }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            background: #ef4444;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
        }
        h2 { margin-top: 0; font-size: 18px; color: #94a3b8; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .log-box {
            background: #020617;
            border-radius: 6px;
            padding: 15px;
            height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #34d399;
        }
        .btn {
            background: #0284c7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background: #0369a1; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>GM AI — Workspace Portal</h1>
            <div id="status" class="status-badge">OFFLINE</div>
        </header>
        
        <div class="grid">
            <div class="card">
                <h2>📡 Telemetry Command Gateway</h2>
                <p>Submit remote automation requests straight to the local LangGraph pipeline core:</p>
                <input type="text" id="cmdInput" placeholder="e.g., click notepad and type report complete" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 15px; box-sizing: border-box;">
                <button class="btn" onclick="dispatchCommand()">Dispatch Wireless Command</button>
            </div>
            
            <div class="card">
                <h2>📊 Real-Time Interaction Stream</h2>
                <div id="logStream" class="log-box">Connecting to local system socket cluster...<br></div>
            </div>
        </div>
    </div>

    <script>
        let ws;
        const statusBadge = document.getElementById('status');
        const logStream = document.getElementById('logStream');

        function connectSocket() {
            // Establish dynamic bridge to your local network broker port
            ws = new WebSocket('ws://' + window.location.hostname + ':8765');

            ws.onopen = () => {
                statusBadge.textContent = 'ONLINE';
                statusBadge.style.background = '#22c55e';
                appendLog('System Connection Secured. Streaming cross-device telemetry active.');
            };

            ws.onmessage = (event) => {
                appendLog('Received Packet: ' + event.data);
            };

            ws.onclose = () => {
                statusBadge.textContent = 'OFFLINE';
                statusBadge.style.background = '#ef4444';
                appendLog('Connection Dropped. Retrying connection handshake sequence in 5 seconds...');
                setTimeout(connectSocket, 5000);
            };
        }

        function appendLog(msg) {
            const time = new Date().toLocaleTimeString();
            logStream.innerHTML += `[${time}] ${msg}<br>`;
            logStream.scrollTop = logStream.scrollHeight;
        }

        function dispatchCommand() {
            const input = document.getElementById('cmdInput');
            if (!input.value.trim()) return;

            const payload = {
                device: "Web UI Dashboard",
                command: input.value.trim()
            };

            ws.send(JSON.stringify(payload));
            appendLog('Dispatched: "' + input.value.trim() + '"');
            input.value = '';
        }

        // Initialize handshake interface loop on page load
        connectSocket();
    </script>
</body>
</html>
