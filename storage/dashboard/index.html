<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GM AI v1.7 -- Telemetry Dashboard Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e293b; padding-bottom: 20px; margin-bottom: 30px; }
        .title h1 { font-size: 24px; color: #38bdf8; font-weight: 600; letter-spacing: 0.5px; }
        .title p { font-size: 13px; color: #94a3b8; margin-top: 4px; }
        .badge { padding: 6px 14px; font-size: 12px; font-weight: 700; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase; }
        .status-online { background: #22c55e; color: #ffffff; box-shadow: 0 0 10px rgba(34,197,94,0.3); }
        .status-offline { background: #ef4444; color: #ffffff; box-shadow: 0 0 10px rgba(239,68,68,0.3); }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card h2 { font-size: 16px; color: #f1f5f9; margin-bottom: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-left: 4px solid #38bdf8; padding-left: 10px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { font-size: 12px; text-transform: uppercase; color: #94a3b8; padding: 12px 16px; border-bottom: 2px solid #334155; font-weight: 600; }
        td { font-size: 14px; padding: 14px 16px; border-bottom: 1px solid #334155; color: #e2e8f0; }
        tr:hover { background: rgba(56,189,248,0.04); }
        .stream-box { background: #090d16; border-radius: 8px; border: 1px solid #1e293b; height: 350px; overflow-y: auto; padding: 16px; font-family: 'Courier New', Courier, monospace; font-size: 12px; color: #38bdf8; line-height: 1.6; }
        .input-group { display: flex; gap: 12px; margin-top: 20px; }
        input[type="text"] { flex: 1; background: #090d16; border: 1px solid #334155; border-radius: 8px; padding: 12px 16px; color: #f8fafc; font-size: 14px; outline: none; }
        input[type="text"]:focus { border-color: #38bdf8; }
        button { background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; padding: 12px 24px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        button:hover { background: #0ea5e9; }
        .status-cell { font-weight: 700; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">
            <h1>GM AI Agent Execution Portal</h1>
            <p>Persistent High-Frequency Telemetry Audit Dashboard View</p>
        </div>
        <div id="statusBadge" class="badge status-offline">Connecting</div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Relational System Action Audit Ledger</h2>
            <table>
                <thead>
                    <tr>
                        <th style="width: 10%;">ID</th>
                        <th style="width: 25%;">Device Source</th>
                        <th style="width: 45%;">Command Intent</th>
                        <th style="width: 20%;">Execution Status</th>
                    </tr>
                </thead>
                <tbody id="auditTableBody">
                    <!-- Dynamic socket records append here -->
                </tbody>
            </table>
            <div class="input-group">
                <input type="text" id="cmdInput" placeholder="Type standalone agent execution instruction...">
                <button onclick="dispatchCommand()">Run Action</button>
            </div>
        </div>

        <div class="card">
            <h2>Live Telemetry Logs</h2>
            <div id="logStream" class="stream-box"></div>
        </div>
    </div>

    <script>
        let ws;
        const statusBadge = document.getElementById('statusBadge');
        const logStream = document.getElementById('logStream');
        const tableBody = document.getElementById('auditTableBody');

        function connectSocket() {
            ws = new WebSocket('ws://' + (window.location.hostname || 'localhost') + ':8765');

            ws.onopen = () => {
                statusBadge.textContent = 'ONLINE';
                statusBadge.className = 'badge status-online';
                appendLog('System Connection Secured. Streaming cross-device telemetry active.');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    appendLog('Processed Incoming Socket Event.');
                    
                    const id = data.id || 'NEW';
                    const device = data.device || 'Remote Display';
                    const intent = data.command || data.msg || 'Unknown Intent';
                    const status = data.status || 'PENDING_AUTH';
                    
                    let statusColor = '#38bdf8';
                    if (status.includes('success') || status.includes('EXECUTED')) statusColor = '#22c55e';
                    if (status.includes('rejected') || status.includes('ERROR')) statusColor = '#ef4444';

                    const newRow = `<tr>
                        <td>#${id}</td>
                        <td><strong>${device}</strong></td>
                        <td>${intent}</td>
                        <td class="status-cell" style="color: ${statusColor};">${status.replace('_', ' ')}</td>
                    </tr>`;
                    
                    tableBody.innerHTML = newRow + tableBody.innerHTML;
                } catch(e) {
                    appendLog('Raw Data Stream: ' + event.data);
                }
            };

            ws.onclose = () => {
                statusBadge.textContent = 'OFFLINE';
                statusBadge.className = 'badge status-offline';
                appendLog('Connection Dropped. Retrying connection handshake sequence...');
                setTimeout(connectSocket, 5000);
            };
        }

        function appendLog(msg) {
            const time = new Date().toLocaleTimeString();
            logStream.innerHTML += `[${time}] ${msg}<br>`;
            logStream.scrollTop = logStream.scrollHeight;
        }

        function dispatchCommand() {
            const input = document.getElementById('cmdInput');
            const cmdText = input.value.trim();
            if (!cmdText) return;

            const payload = {
                device: "Web UI Dashboard",
                command: cmdText
            };

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(payload));
                appendLog('Dispatched: "' + cmdText + '"');
                input.value = '';
            } else {
                appendLog('Error: Socket server offline. Dispatch aborted.');
            }
        }

        connectSocket();
    </script>
</body>
</html>
